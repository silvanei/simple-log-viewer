name: Release silvanei/simple-log-viewer image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: silvanei/simple-log-viewer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          target: production
          push: true
          context: .
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        run: |
          VERSION="${{ github.ref_name }}"
          STRIPPED="${VERSION#v}"

          START=$(grep -n "^## \\[${STRIPPED}\\]" CHANGELOG.md | head -1 | cut -d: -f1)
          END=$(tail -n +$((START+1)) CHANGELOG.md | grep -n "^## \\[" | head -1 | cut -d: -f1)
          NOTES=$(tail -n +$START CHANGELOG.md | head -n $END)

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ github.token }}
